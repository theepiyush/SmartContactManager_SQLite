# ==================== Server Configuration ====================
# Render apna PORT deta hai, local run ke liye default 8082 rakha gaya hai
server.port=${PORT:8082}

# ==================== Database Configuration ==================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3307/smartcontact}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Piyush@1234}

# ==================== JPA Configuration =======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# ==================== Thymeleaf Configuration =================
spring.thymeleaf.enabled=true

# ==================== Multipart File Config ===================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
